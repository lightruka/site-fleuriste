<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Détail bouquet | Maison Florale</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="container nav-wrap">
        <a class="logo" href="index.html"
          ><img class="logo-icon" src="logo-floral.svg" alt="" /><span
            >Maison Florale</span
          ></a
        >
        <button class="menu-btn" aria-label="Ouvrir le menu">☰</button>
        <nav class="nav-links">
          <a href="accueil.html">Accueil</a>
          <a class="active" href="produits.html">Produits</a>
          <a href="apropos.html">À propos</a>
          <a href="contact.html">Contact</a>
        </nav>
      </div>
    </header>

    <main class="container section">
      <a class="btn btn-secondary" href="produits.html">← Retour aux produits</a>
      <section class="detail-layout">
        <img
          id="detail-image"
          src="https://images.unsplash.com/photo-1463320898484-cdee8141c787?auto=format&fit=crop&w=1400&q=80"
          alt="Bouquet floral"
        />
        <article class="panel">
          <span class="card-tag" id="detail-category">Catégorie</span>
          <h1 id="detail-name">Bouquet Maison Florale</h1>
          <p id="detail-description">
            Description détaillée du bouquet sélectionné.
          </p>
          <p class="price-note" id="detail-price">Budget indicatif : --</p>
        </article>
      </section>
    </main>

    <footer class="site-footer">
      <div class="container">
        <p>
          © <span id="year"></span> Maison Florale - Fleuriste passionné |
          <a href="https://instagram.com" target="_blank" rel="noreferrer">Instagram</a>
          |
          <a href="contact.html">Mentions légales</a>
        </p>
      </div>
    </footer>
    <script src="script.js"></script>
  </body>
</html>
